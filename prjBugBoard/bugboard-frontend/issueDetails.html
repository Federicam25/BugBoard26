<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Issue</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-container">
    <header class="page-header">
        <h2>Dettaglio Issue</h2>
        <div class="header-actions">
            <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
        </div>
    </header>
    <div class="form-container">
        <form id="issue-form">
            <div class="form-group">
                <label>Id</label>
                <input type="text" id="id" readonly>
            </div>
            <div class="form-group">
                <label>Titolo</label>
                <input type="text" id="title" readonly>
            </div>
            <div class="form-group">
                <label>Descrizione</label>
                <textarea id="description" rows="4" readonly></textarea>
            </div>
            <div class="form-group">
                <label>Tipo</label>
                <select id="type" disabled>
                    <option value="BUG">BUG</option>
                    <option value="FEATURE">FEATURE</option>
                    <option value="QUESTION">QUESTION</option>
                    <option value="DOCUMENTATION">DOCUMENTATION</option>
                </select>
            </div>
            <div class="form-group">
                <label>Priorità</label>
                <select id="priority">
                    <option value="LOW">LOW</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="HIGH">HIGH</option>
                </select>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status">
                    <option value="todo">Todo</option>
                    <option value="in_progress">In Progress</option>
                    <option value="done">Done</option>
                </select>
            </div>
            <div class="form-group">
                <label>Commento</label>
                <textarea id="commento" rows="4"></textarea>
            </div>
            <div id="assign-container" class="form-group">
                <label>Assegnato a</label>
                <select id="assignedTo"></select>
                <label class="form-note" style="
                    padding: 10px;
                    font-size: 12px;">
                    La lista è ordinata in maniera crescente
                    in base al carico di lavoro. </label>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salva modifiche</button>
            </div>
        </form>
    </div>
    <div id="history-container" class="table-container">
        <h3>Cronologia modifiche</h3>
        <table class="issue-table">
            <thead>
            <tr>
                <th>Data</th>
                <th>Utente</th>
                <th>Campo</th>
                <!--th>Da</th-->
                <th>Valore</th>
            </tr>
            </thead>
            <tbody id="history-table">
            </tbody>
        </table>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/issueDetails.js"></script>
</body>
</html>
